openapi: 3.1.0
info:
  title: cloud-asset-auditor
  description: |
    Multi-cloud inventory API. Audits Cloudflare, OCI, and Kubernetes
    into one canonical asset schema, plus a derived topology graph.

    All endpoints under `/api/v1/` are versioned per the project's
    contract (init-plan.md §6 invariant 6). `/healthz` and `/metrics`
    sit outside the versioned namespace because they're
    infrastructure concerns (probes + scrapers), not application API.
  version: "0.1.0"
  contact:
    name: cloud-asset-auditor
    url: https://github.com/cloud-auditor/cloud-asset-auditor
  license:
    name: TBD
    url: https://github.com/cloud-auditor/cloud-asset-auditor#license

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: probe
    description: Liveness + scrape endpoints (always open, never authenticated)
  - name: providers
    description: Discovery of registered providers
  - name: audit
    description: Asset inventory collection
  - name: topology
    description: Derived request-path graph between assets

paths:
  /healthz:
    get:
      tags: [probe]
      summary: Liveness probe
      description: Always returns 200. Never authenticated (k8s probes don't carry credentials).
      responses:
        "200":
          description: Service is alive
          content:
            text/plain:
              schema:
                type: string
                example: "ok\n"

  /metrics:
    get:
      tags: [probe]
      summary: Prometheus metrics
      description: |
        OpenMetrics + Prometheus text-exposition format. Always open
        (matches `/healthz` semantics; scrapers don't carry credentials).

        Project-specific series:
          - `auditor_assets_collected_total{provider,type}` (counter)
          - `auditor_audit_duration_seconds{provider}` (histogram)
          - `auditor_audit_errors_total{provider}` (counter)
          - `auditor_server_sse_clients` (gauge)

        Plus the standard `process_*` and `go_*` runtime collectors.
      responses:
        "200":
          description: Metrics
          content:
            text/plain:
              schema:
                type: string

  /api/v1/openapi.yaml:
    get:
      tags: [probe]
      summary: This document
      description: The OpenAPI 3.1 specification for the public API.
      responses:
        "200":
          description: The spec
          content:
            application/yaml:
              schema:
                type: string

  /api/v1/providers:
    get:
      tags: [providers]
      summary: List registered providers
      responses:
        "200":
          description: Sorted list of registered provider names plus the server's auth mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvidersResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/audit:
    get:
      tags: [audit]
      summary: Streamed audit (SSE)
      description: |
        Server-Sent Events stream of one event per Asset. The full event sequence:

            event: meta        data: {"started_at": "RFC3339"}                          (exactly one, first)
            event: init_error  data: {"message": "..."}                                 (zero or more, before assets)
            event: asset       data: <Asset>                                            (zero or more, in arrival order)
            event: error       data: {"message": "..."}                                 (zero or more, interleaved)
            event: done        data: {"count": N, "elapsed_ms": M, "errors": K}        (exactly one, last)

        Long audits keep the connection open for minutes; use the
        `done` event (not the connection close) as the completion
        signal, since browsers may auto-reconnect on EventSource
        errors.
      parameters:
        - $ref: "#/components/parameters/ProvidersParam"
        - $ref: "#/components/parameters/TimeoutParam"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SSEEventStream"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/audit/export:
    get:
      tags: [audit]
      summary: Synchronous audit download
      description: |
        Runs the same audit as `/api/v1/audit` but blocks until done,
        then returns the rendered output as an attachment. Same data
        the CLI's `auditor audit` emits.
      parameters:
        - $ref: "#/components/parameters/ProvidersParam"
        - $ref: "#/components/parameters/TimeoutParam"
        - name: format
          in: query
          description: Output format
          schema:
            type: string
            enum: [json, ndjson, csv, xlsx]
            default: json
        - name: sheet_by
          in: query
          description: >
            For `format=xlsx` only: how to partition assets across worksheets.
            One dimension — `none`, `provider`, `type`, `region`, `account`, or
            `tag:KEY` (e.g. `tag:compartment_id`) — or several joined with `+`
            for a composite (e.g. `region+tag:compartment_id` for one sheet per
            region/compartment, labelled `region (compartment)`). Ignored for
            other formats.
          schema:
            type: string
            default: provider
        - name: summary
          in: query
          description: >
            For `format=xlsx` only: when truthy (`1`/`true`/`yes`/`on`), prepend
            a "Summary" worksheet with totals and per-sheet/per-type counts,
            each per-sheet row linked to its worksheet. Ignored for other formats.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Rendered audit output
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="assets.json"'
            X-Auditor-Init-Errors:
              description: Semicolon-separated factory-time errors (e.g. missing provider creds)
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Asset"
            application/x-ndjson:
              schema:
                type: string
                description: One JSON-encoded Asset per line
            text/csv:
              schema:
                type: string
                description: Header row plus one row per Asset; Tags flattened to k1=v1;k2=v2
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
                description: Multi-sheet Excel workbook; one worksheet per sheet_by group
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/topology:
    get:
      tags: [topology]
      summary: Inferred request-path graph between assets
      description: |
        Forces `--include-raw` internally so K8s resolvers can parse
        Ingress / HTTPRoute / Service payloads. The rendered output
        omits `raw` to stay readable.

        Resolvers:
          - `dns` — DNS records → matched LB/Service by IP or CNAME (heuristic)
          - `lb-backend` — OCI LB IPs → K8s Service external IPs (heuristic)
          - `gateway-route` — K8s Ingress/HTTPRoute → backing Service (exact)
          - `waf` — CF Rulesets/Access/Tunnels → protected zone (exact; today emits nothing because CF security stubs are unimplemented)
      parameters:
        - $ref: "#/components/parameters/ProvidersParam"
        - $ref: "#/components/parameters/TimeoutParam"
        - name: hostname
          in: query
          description: Filter to the connected component reachable from this DNS hostname. Repeatable.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: include-orphans
          in: query
          description: Keep asset nodes that have no incident edges
          schema:
            type: boolean
            default: false
        - name: format
          in: query
          description: Output format. `json` returns the envelope below; others return a downloadable rendering.
          schema:
            type: string
            enum: [json, dot, mermaid, excalidraw]
            default: json
      responses:
        "200":
          description: Topology graph or rendered file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopologyResponse"
            text/vnd.graphviz:
              schema:
                type: string
            text/plain:
              schema:
                type: string
                description: Used by the `mermaid` format
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  parameters:
    ProvidersParam:
      name: providers
      in: query
      description: Comma-separated provider names (e.g. `cloudflare,kubernetes`). Empty selects every registered provider; the literal `none` selects zero.
      schema:
        type: string
        example: cloudflare,kubernetes
    TimeoutParam:
      name: timeout
      in: query
      description: Audit timeout as a Go duration string (e.g. `30m`, `2h`). Defaults to `10m`.
      schema:
        type: string
        pattern: '^\d+(\.\d+)?(ns|us|µs|ms|s|m|h)$'
        default: 10m

  responses:
    Unauthorized:
      description: Server is running with `--auth=basic` or `--auth=token` and the request didn't carry valid credentials.
      content:
        text/plain:
          schema:
            type: string
            example: unauthorized
    BadRequest:
      description: Invalid query parameter (typically an unknown format)
      content:
        text/plain:
          schema:
            type: string

  schemas:
    ProvidersResponse:
      type: object
      required: [providers, auth_mode]
      properties:
        providers:
          type: array
          items: { type: string }
          example: [cloudflare, kubernetes, oci]
        auth_mode:
          type: string
          enum: [none, basic, token]

    Asset:
      type: object
      description: The canonical provider-agnostic representation of a cloud resource.
      required: [provider, account_id, type, id, name]
      properties:
        provider:
          type: string
          enum: [cloudflare, oci, kubernetes]
        account_id:
          type: string
          description: Tenancy OCID / Cloudflare account ID / Kubernetes cluster name
        region:
          type: string
        type:
          type: string
          description: "Format: `<provider>.<resource>` (e.g. `cloudflare.dns_record`, `oci.compute.instance`); Kubernetes uses `<group>/<version>.<kind>` (e.g. `apps/v1.Deployment`, `v1.Pod`)"
          example: cloudflare.dns_record
        id:
          type: string
          description: Provider-native unique identifier
        name:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        tags:
          type: object
          additionalProperties:
            type: string
        raw:
          description: Full provider SDK payload — present only when `--include-raw` was requested
          oneOf:
            - type: object
            - type: array
            - { nullable: true }

    AssetRef:
      type: object
      required: [provider, type, id]
      properties:
        provider: { type: string }
        account_id: { type: string }
        type: { type: string }
        id: { type: string }

    Edge:
      type: object
      description: A derived relationship between two assets, produced by the topology resolvers.
      required: [from, to, kind, confidence]
      properties:
        from: { $ref: "#/components/schemas/AssetRef" }
        to: { $ref: "#/components/schemas/AssetRef" }
        kind:
          type: string
          enum: [dns, waf, lb-backend, gateway-route, service-backend]
        hostname: { type: string }
        port: { type: integer }
        confidence:
          type: string
          enum: [exact, heuristic]
          description: "`exact` = ID-matched (same cluster, same tenancy); `heuristic` = matched by IP or hostname across cloud boundaries"

    TopologyResponse:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items: { $ref: "#/components/schemas/Asset" }
        edges:
          type: array
          items: { $ref: "#/components/schemas/Edge" }
        init_errors:
          type: array
          items: { type: string }
        errors:
          type: array
          items: { type: string }

    SSEEventStream:
      type: string
      description: |
        text/event-stream framed per RFC 8895. Each event has an
        `event:` line naming the type (`meta`, `init_error`, `asset`,
        `error`, `done`) and a `data:` line carrying a JSON object —
        see the endpoint description above for the per-event schema.
