# golangci-lint v2.x config. See https://golangci-lint.run/usage/configuration/
#
# Pinned to schema v2 because the v1 line stopped getting Go-toolchain
# bumps and refuses to lint code targeting Go 1.26+. CI installs the
# linter via `go install` so it inherits the project's setup-go toolchain.
version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose      # http.Response.Body must be Close()d
    - copyloopvar    # Go 1.22+ loop-var capture redundancy
    - errcheck       # unhandled errors
    - errorlint      # errors.Is/As usage instead of == / type-assertion
    - govet          # standard go vet checks
    - ineffassign    # unused assignments
    - misspell       # English-only misspellings
    - staticcheck    # the comprehensive one; folds in former gosimple + stylecheck
    - unused         # unused identifiers

  settings:
    errcheck:
      exclude-functions:
        - (io.Writer).Write
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint
        - (encoding/json.Encoder).Encode
    staticcheck:
      checks: ["all"]

  exclusions:
    rules:
      # Tests legitimately use Background context, ignore many error
      # returns in setup helpers, etc.
      - path: '_test\.go'
        linters: [errcheck, bodyclose]
      # Stub collectors intentionally accept-and-ignore their arguments
      # until their real implementations land.
      - path: 'internal/providers/.*/stubs\.go'
        linters: [revive, unparam]

# v2 moved formatters out of `linters` into their own block.
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/cloud-auditor/cloud-asset-auditor
