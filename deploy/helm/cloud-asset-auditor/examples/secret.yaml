# Example credentials Secret for cloud-asset-auditor.
#
# Apply with:
#   kubectl -n <ns> apply -f secret.yaml
#
# Then reference from your helm install:
#   helm install auditor ./deploy/helm/cloud-asset-auditor \
#     --set credentials.existingSecret=cloud-asset-auditor-credentials \
#     --set credentials.ociKeySecret=cloud-asset-auditor-oci-key
#
# Every key is optional — populate only the providers you actually want
# the deployment to audit. Unset providers fall back to the auditor's
# "warn, continue" path so a missing token doesn't crash a run.
#
# Note: this file is for documentation only — DO NOT commit a real Secret
# with real values. Generate it from a secret manager (Vault, Sealed
# Secrets, External Secrets, etc.) at deploy time.

apiVersion: v1
kind: Secret
metadata:
  name: cloud-asset-auditor-credentials
type: Opaque
stringData:
  # --- Cloudflare (Phase 2) -------------------------------------------------
  # Token must have at minimum Zone:Read + Zone.DNS:Read at the account level.
  CLOUDFLARE_API_TOKEN: "replace-me"

  # --- OCI (Phase 3) ------------------------------------------------------
  # The OCI SDK's env-var auth path reads OCI_TENANCY / OCI_USER /
  # OCI_FINGERPRINT / OCI_REGION as values and OCI_KEY_PATH as a *path* to
  # the PEM-encoded private key. The private key file itself goes in a
  # separate Secret (see secret-oci-key.yaml below), so this Secret
  # contains everything except the key material.
  OCI_TENANCY: "ocid1.tenancy.oc1..replace-me"
  OCI_USER:    "ocid1.user.oc1..replace-me"
  OCI_REGION:  "us-ashburn-1"
  OCI_FINGERPRINT: "aa:bb:cc:dd:ee:ff:00:11:22:33:44:55:66:77:88:99"

  # --- Auditor web UI auth (Phase 5, mode=deployment with --auth basic|token)
  AUDITOR_BASIC_USER: "auditor"
  AUDITOR_BASIC_PASS: "replace-me"
  AUDITOR_API_TOKEN:  "replace-me"

  # --- Kubernetes -----------------------------------------------------------
  # No keys needed — the in-cluster provider uses the pod's
  # ServiceAccount token automatically. RBAC is wired by the chart's
  # rbac.yaml template.

---
# Optional second Secret holding *just* the OCI private key file.
# Referenced via .Values.credentials.ociKeySecret. The chart mounts the
# `oci_api_key.pem` key at /etc/oci/oci_api_key.pem and points
# OCI_KEY_PATH at it automatically.
apiVersion: v1
kind: Secret
metadata:
  name: cloud-asset-auditor-oci-key
type: Opaque
stringData:
  oci_api_key.pem: |
    -----BEGIN PRIVATE KEY-----
    MIIEvgIBADANBgkqhkiG9w0BAQEFAASCBKgwggSkAgEAAoIBAQ... (truncated)
    -----END PRIVATE KEY-----
