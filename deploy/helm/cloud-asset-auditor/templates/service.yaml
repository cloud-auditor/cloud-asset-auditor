{{- if eq .Values.mode "deployment" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloud-asset-auditor.fullname" . }}
  labels:
    {{- include "cloud-asset-auditor.labels" . | nindent 4 }}
  {{- with .Values.deployment.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.deployment.service.type }}
  ports:
    - name: http
      port: {{ .Values.deployment.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "cloud-asset-auditor.selectorLabels" . | nindent 4 }}
{{- end }}
