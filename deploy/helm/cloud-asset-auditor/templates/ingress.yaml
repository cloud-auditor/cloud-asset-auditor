{{- if and (eq .Values.mode "deployment") .Values.deployment.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cloud-asset-auditor.fullname" . }}
  labels:
    {{- include "cloud-asset-auditor.labels" . | nindent 4 }}
  {{- with .Values.deployment.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.deployment.ingress.className }}
  ingressClassName: {{ .Values.deployment.ingress.className | quote }}
  {{- end }}
  {{- with .Values.deployment.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.deployment.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "cloud-asset-auditor.fullname" $ }}
                port:
                  number: {{ $.Values.deployment.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
