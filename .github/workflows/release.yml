name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # GitHub Release creation
  id-token: write   # cosign keyless OIDC signing
  packages: write   # mirrors with docker.yml; benign here

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Required by .goreleaser.yaml's signs: section.
      - uses: sigstore/cosign-installer@v3

      # Required by sboms: — anchore/sbom-action installs syft.
      - uses: anchore/sbom-action/download-syft@v0

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
